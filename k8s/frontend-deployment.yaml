apiVersion: apps/v1
kind: Deployment
metadata:
  name: praxis-frontend
  namespace: praxis
  labels:
    app: praxis-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: praxis-frontend
  template:
    metadata:
      labels:
        app: praxis-frontend
    spec:
      nodeSelector:
        kubernetes.io/hostname: thor
      containers:
        - name: praxis-frontend
          image: localhost/praxis-frontend:v1.0.0
          imagePullPolicy: Never
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: praxis-frontend
  namespace: praxis
spec:
  selector:
    app: praxis-frontend
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
