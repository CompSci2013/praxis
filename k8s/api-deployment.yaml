apiVersion: apps/v1
kind: Deployment
metadata:
  name: praxis-api
  namespace: praxis
  labels:
    app: praxis-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: praxis-api
  template:
    metadata:
      labels:
        app: praxis-api
    spec:
      nodeSelector:
        kubernetes.io/hostname: thor
      containers:
        - name: praxis-api
          image: localhost/praxis-api:v1.0.0
          imagePullPolicy: Never
          ports:
            - containerPort: 3001
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3001"
            - name: CONTENT_PATH
              value: "/content"
            - name: RAG_URL
              value: "http://192.168.0.244:30800"
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 3
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: praxis-api
  namespace: praxis
spec:
  selector:
    app: praxis-api
  ports:
    - port: 3001
      targetPort: 3001
      protocol: TCP
